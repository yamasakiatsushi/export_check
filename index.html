<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>輸入規制チェッカー</title>
<style>
:root {
  --text: #1d1d1f;
  --text-sub: rgba(0,0,0,0.56);
  --text-ter: rgba(0,0,0,0.35);
  --bg: #f5f5f7;
  --surface: #fff;
  --blue: #0071e3;
  --blue-bg: rgba(0,113,227,0.08);
  --blue-border: rgba(0,113,227,0.25);
  --ok: #1a7f37;
  --ok-bg: rgba(26,127,55,0.07);
  --warn: #b45309;
  --warn-bg: rgba(180,83,9,0.07);
  --danger: #c0392b;
  --danger-bg: rgba(192,57,43,0.07);
  --none-c: rgba(0,0,0,0.28);
  --border: rgba(0,0,0,0.1);
  --shadow: 0 1px 4px rgba(0,0,0,0.09);
  --r: 14px;
  --font: "Hiragino Kaku Gothic Pro","ヒラギノ角ゴ Pro W3",Meiryo,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding:16px 16px 48px;font-size:15px;line-height:1.5;letter-spacing:-0.2px;}
.frame{max-width:430px;margin:0 auto;display:flex;flex-direction:column;gap:10px;}

/* ─ Header ─ */
header{background:var(--surface);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
.hicon{width:36px;height:36px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
header h1{font-size:15px;font-weight:600;letter-spacing:-0.3px;}
header p{font-size:12px;color:var(--text-sub);margin-top:1px;}

/* ─ Card ─ */
.card{background:var(--surface);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);}
.card-hd{padding:13px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.card-title{display:flex;align-items:center;gap:10px;}
.snum{width:22px;height:22px;background:var(--blue);border-radius:50%;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.snum.green{background:var(--ok);}
.card-hd h2{font-size:14px;font-weight:600;letter-spacing:-0.2px;}

/* ─ Step1: Upload ─ */
.drop{border:1.5px dashed rgba(0,0,0,0.15);border-radius:10px;padding:26px 16px;text-align:center;background:#fafafa;cursor:pointer;margin:14px 18px;transition:all 0.2s;}
.drop:hover,.drop.drag-over{border-color:var(--blue);background:var(--blue-bg);}
.drop-icon{font-size:28px;margin-bottom:6px;}
.drop-label{font-size:14px;color:var(--blue);font-weight:500;}
.drop-sub{font-size:12px;color:var(--text-sub);margin-top:3px;}
#file-input{display:none;}
#preview-wrap{display:none;margin:0 18px 14px;border-radius:10px;overflow:hidden;position:relative;}
#preview-img{width:100%;max-height:220px;object-fit:cover;display:block;}
#preview-remove{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.55);border:none;border-radius:20px;color:#fff;font-size:12px;padding:4px 10px;cursor:pointer;}

/* ─ Step2: Countries ─ */
.row-actions{display:flex;gap:12px;}
.link-btn{font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;padding:0;}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:12px 14px 14px;}
.cbtn{padding:10px 4px;border-radius:10px;border:1.5px solid var(--border);background:#fafafa;color:var(--text-sub);font-size:12px;font-family:var(--font);text-align:center;cursor:pointer;line-height:1.3;transition:all 0.15s;}
.cbtn .flag{font-size:18px;display:block;margin-bottom:3px;}
.cbtn.sel{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);font-weight:500;}

/* ─ Step3: Regulation ─ */
.s3-body{padding:14px 16px 6px;}
.s3-action-bar{display:flex;align-items:center;justify-content:space-between;padding:0 0 12px;}
.s3-action-left{display:flex;align-items:center;gap:10px;}
.s3-sel-count{font-size:12px;color:var(--blue);font-weight:500;}
.btn-action{padding:9px 18px;border-radius:980px;background:var(--blue);color:#fff;border:none;font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px;}
.btn-action:disabled{opacity:0.45;cursor:not-allowed;}
.btn-spinner{width:12px;height:12px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.cr-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.cr{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:#fafafa;border:1.5px solid var(--border);cursor:pointer;transition:all 0.12s;user-select:none;}
.cr.checked{background:var(--blue-bg);border-color:var(--blue-border);}
.cr-cb{width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;transition:all 0.15s;}
.cr.checked .cr-cb{background:var(--blue);border-color:var(--blue);}
.cr-flag{font-size:17px;flex-shrink:0;}
.cr-name{flex:1;font-size:13px;font-weight:500;}
.cr-badge{padding:3px 9px;border-radius:20px;font-size:11px;flex-shrink:0;}
.cr-badge.fresh{background:var(--ok-bg);color:var(--ok);}
.cr-badge.stale{background:var(--warn-bg);color:var(--warn);}
.cr-badge.none-data{background:rgba(0,0,0,0.05);color:var(--text-ter);}
.reg-status-box{display:none;margin:0 0 4px;padding:10px 14px;border-radius:10px;font-size:12px;line-height:1.6;}
.reg-status-box.ok{background:var(--ok-bg);color:var(--ok);}
.reg-status-box.error{background:var(--danger-bg);color:var(--danger);}

/* ─ Step4: Check ─ */
.btn-check{width:100%;padding:15px;border-radius:980px;border:none;background:var(--blue);color:#fff;font-size:16px;font-weight:500;font-family:var(--font);cursor:pointer;letter-spacing:-0.2px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-check:disabled{opacity:0.45;cursor:not-allowed;}
.check-spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:none;}

/* ─ Results ─ */
#results{display:none;}
.result-summary{padding:14px 16px;border-radius:12px;margin-bottom:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);}
.result-summary.ok{background:var(--ok-bg);color:var(--ok);border:1px solid rgba(26,127,55,0.2);}
.result-summary.warn{background:var(--warn-bg);color:var(--warn);border:1px solid rgba(180,83,9,0.2);}
.result-summary.danger{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(192,57,43,0.2);}
.result-summary .ricon{font-size:20px;}
.ingredients-box{background:var(--surface);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);}
.ingredients-box h3{font-size:11px;color:var(--text-sub);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.ingredient-tags{display:flex;flex-wrap:wrap;gap:6px;}
.ingredient-tag{padding:3px 10px;border-radius:20px;font-size:12px;background:#f5f5f7;border:1px solid var(--border);color:var(--text-sub);}
.ingredient-tag.flagged{background:var(--danger-bg);border-color:rgba(192,57,43,0.3);color:var(--danger);}
.ingredient-tag.caution{background:var(--warn-bg);border-color:rgba(180,83,9,0.3);color:var(--warn);}
.country-result{background:var(--surface);border-radius:12px;overflow:hidden;margin-bottom:8px;box-shadow:var(--shadow);}
.country-result-header{padding:13px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background 0.15s;}
.country-result-header:hover{background:#fafafa;}
.country-result-header .cflag{font-size:20px;}
.country-result-header .cname{flex:1;font-size:13px;font-weight:600;}
.status-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;}
.badge-ok{background:var(--ok-bg);color:var(--ok);}
.badge-warn{background:var(--warn-bg);color:var(--warn);}
.badge-danger{background:var(--danger-bg);color:var(--danger);}
.chevron{color:var(--text-ter);font-size:11px;transition:transform 0.2s;}
.country-result.open .chevron{transform:rotate(180deg);}
.country-result-body{display:none;padding:14px 16px;border-top:1px solid var(--border);font-size:13px;color:var(--text-sub);line-height:1.7;}
.country-result.open .country-result-body{display:block;}
.issue-item{background:var(--danger-bg);border:1px solid rgba(192,57,43,0.2);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.issue-name{font-size:13px;font-weight:600;color:var(--danger);margin-bottom:4px;}
.issue-reason{font-size:12px;color:var(--text-sub);margin-bottom:6px;}
.caution-item{background:var(--warn-bg);border:1px solid rgba(180,83,9,0.2);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.caution-name{font-size:13px;font-weight:600;color:var(--warn);margin-bottom:4px;}
.sources-toggle{font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;margin-top:4px;display:block;}
.sources-list{display:none;margin-top:8px;padding:10px 12px;background:#f5f5f7;border-radius:8px;}
.sources-list.open{display:block;}
.source-link{display:block;font-size:11px;color:var(--blue);text-decoration:none;margin-bottom:4px;word-break:break-all;}
.source-link:hover{text-decoration:underline;}
.error-box{background:var(--danger-bg);border:1px solid rgba(192,57,43,0.2);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--danger);}
.result-note{font-size:11px;color:var(--text-ter);margin-top:10px;line-height:1.6;}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(29,29,31,0.88);border-radius:20px;padding:10px 18px;font-size:12px;color:#fff;opacity:0;pointer-events:none;transition:all 0.25s;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="frame">

<header>
  <div class="hicon">🔍</div>
  <div>
    <h1>輸入規制チェッカー</h1>
    <p>原材料表示 × 各国輸入規制の照合ツール</p>
  </div>
</header>

<!-- Step 1 -->
<div class="card">
  <div class="card-hd">
    <div class="card-title"><div class="snum">1</div><h2>原材料表示の写真</h2></div>
  </div>
  <div id="drop-zone" class="drop">
    <div class="drop-icon">📷</div>
    <div class="drop-label">タップして写真を選択</div>
    <div class="drop-sub">カメラ撮影またはファイルから選択</div>
    <input type="file" id="file-input" accept="image/*">
  </div>
  <div id="preview-wrap">
    <img id="preview-img" src="" alt="プレビュー">
    <button id="preview-remove">✕ 削除</button>
  </div>
</div>

<!-- Step 2 -->
<div class="card">
  <div class="card-hd">
    <div class="card-title"><div class="snum">2</div><h2>チェック対象国</h2></div>
    <div class="row-actions">
      <button class="link-btn" onclick="selectAll()">全選択</button>
      <button class="link-btn" style="color:rgba(0,0,0,0.35);" onclick="clearAll()">解除</button>
    </div>
  </div>
  <div class="cgrid" id="country-grid"></div>
</div>

<!-- Step 3 -->
<div class="card">
  <div class="card-hd">
    <div class="card-title"><div class="snum">3</div><h2>輸入規制情報の更新</h2></div>
  </div>
  <div class="s3-body">
    <div class="s3-action-bar">
      <div class="s3-action-left">
        <button class="link-btn" onclick="selectAllUpdate()">全選択</button>
        <button class="link-btn" style="color:rgba(0,0,0,0.35);" onclick="clearAllUpdate()">解除</button>
        <span class="s3-sel-count" id="sel-count"></span>
      </div>
      <button class="btn-action" id="btn-run" onclick="fetchSelected()">
        <span id="run-spinner" class="btn-spinner"></span>
        <span id="run-label">↻ 更新実行</span>
      </button>
    </div>
    <div class="cr-list" id="country-reg-list"></div>
    <div class="reg-status-box" id="reg-status-box"></div>
  </div>
</div>

<!-- Step 4 -->
<button class="btn-check" id="btn-check" onclick="runCheck()">
  <span id="check-spinner" class="check-spinner"></span>
  <span id="check-label">✓ 確認</span>
</button>

<!-- Results -->
<div id="results"></div>

</div><!-- /frame -->
<div id="toast"></div>

<script>
// ================================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzWa2DFoCYF7vjSWm2g0FupNxVsoGBbxqvLLNIICtcwTU71zvA7y1BePUSWKrk-Ohka/exec';
const GEMINI_MODEL = 'gemini-2.5-flash';
const STALE_DAYS = 30; // この日数を超えると「古い」
// ================================================================

const COUNTRIES = [
  { code:'US', name:'アメリカ',     flag:'🇺🇸' },
  { code:'SG', name:'シンガポール', flag:'🇸🇬' },
  { code:'KR', name:'韓国',         flag:'🇰🇷' },
  { code:'CN', name:'中国',         flag:'🇨🇳' },
  { code:'TW', name:'台湾',         flag:'🇹🇼' },
  { code:'HK', name:'香港',         flag:'🇭🇰' },
  { code:'TH', name:'タイ',         flag:'🇹🇭' },
  { code:'IN', name:'インド',       flag:'🇮🇳' },
  { code:'ID', name:'インドネシア', flag:'🇮🇩' },
];

let selectedCountries = new Set();
let imageBase64 = null;
let imageMediaType = 'image/jpeg';
let geminiApiKey = null;
let regulationInfo = {}; // { code: { data, fetchedAt } }
let selectedForUpdate = new Set();
let isUpdating = false; // 更新実行中フラグ

// ── Init ──────────────────────────────────────────────────────
loadRegulationFromStorage();
buildCountryGrid();
buildCountryRegList();
fetchGeminiKey();

// ── Gemini key from GAS ──
async function fetchGeminiKey() {
  try {
    const res = await fetch(GAS_URL + '?action=getKey');
    const data = await res.json();
    if (data.status === 'ok') geminiApiKey = data.key;
  } catch(e) { console.warn('Key fetch failed:', e.message); }
}

// ── LocalStorage ──
const LS_KEY = 'import_checker_reg_v1';
function loadRegulationFromStorage() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) regulationInfo = JSON.parse(raw);
  } catch(e) {}
}
function saveRegulationToStorage() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(regulationInfo)); } catch(e) {}
}

// ── Country Grid (Step2) ──
function buildCountryGrid() {
  const grid = document.getElementById('country-grid');
  COUNTRIES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cbtn';
    btn.dataset.code = c.code;
    btn.innerHTML = `<span class="flag">${c.flag}</span>${c.name}`;
    btn.onclick = () => toggleCountry(c.code, btn);
    grid.appendChild(btn);
  });
}
function toggleCountry(code, btn) {
  if (selectedCountries.has(code)) {
    selectedCountries.delete(code);
    selectedForUpdate.delete(code);
    btn.classList.remove('sel');
  } else {
    selectedCountries.add(code);
    // 更新実行中でなければStep3にもチェック追加、実行中はチェックなしで追加
    if (!isUpdating) selectedForUpdate.add(code);
    btn.classList.add('sel');
  }
  buildCountryRegList();
}
function selectAll() {
  COUNTRIES.forEach(c => {
    selectedCountries.add(c.code);
    if (!isUpdating) selectedForUpdate.add(c.code);
    document.querySelector(`[data-code="${c.code}"]`).classList.add('sel');
  });
  buildCountryRegList();
}
function clearAll() {
  selectedCountries.clear(); selectedForUpdate.clear();
  document.querySelectorAll('.cbtn').forEach(b => b.classList.remove('sel'));
  buildCountryRegList();
}

// ── Country Reg List (Step3) ──
function buildCountryRegList() {
  const list = document.getElementById('country-reg-list');
  list.innerHTML = '';
  // ②で選択した国のみ表示
  const codes = COUNTRIES.filter(c => selectedCountries.has(c.code));
  if (codes.length === 0) {
    list.innerHTML = '<p style="font-size:12px;color:var(--text-ter);padding:8px 2px;">対象国を選択してください</p>';
    updateSelCount();
    return;
  }
  codes.forEach(c => {
    const row = document.createElement('div');
    row.className = 'cr' + (selectedForUpdate.has(c.code) ? ' checked' : '');
    row.id = `cr-${c.code}`;
    row.onclick = () => toggleUpdateSelect(c.code);
    row.innerHTML = `
      <div class="cr-cb">${selectedForUpdate.has(c.code) ? '✓' : ''}</div>
      <span class="cr-flag">${c.flag}</span>
      <span class="cr-name">${c.name}</span>
      <div class="cr-badge ${badgeClass(c.code)}">${badgeText(c.code)}</div>`;
    list.appendChild(row);
  });
  updateSelCount();
}

function badgeClass(code) {
  const info = regulationInfo[code];
  if (!info) return 'none-data';
  const days = Math.floor((Date.now() - info.fetchedAt) / 86400000);
  return days > STALE_DAYS ? 'stale' : 'fresh';
}

function badgeText(code) {
  const info = regulationInfo[code];
  if (!info) return '未取得';
  const d = new Date(info.fetchedAt);
  const dateStr = `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  const days = Math.floor((Date.now() - info.fetchedAt) / 86400000);
  return `${dateStr} 取得`;
}

function toggleUpdateSelect(code) {
  if (selectedForUpdate.has(code)) selectedForUpdate.delete(code);
  else selectedForUpdate.add(code);
  buildCountryRegList();
}

function selectAllUpdate() {
  // Step2で選択中の国のみ対象
  selectedCountries.forEach(code => selectedForUpdate.add(code));
  // Step2未選択の国はselectedForUpdateから除外
  [...selectedForUpdate].forEach(code => { if (!selectedCountries.has(code)) selectedForUpdate.delete(code); });
  buildCountryRegList();
}
function clearAllUpdate() {
  selectedForUpdate.clear();
  buildCountryRegList();
}

function updateSelCount() {
  const n = selectedForUpdate.size;
  const el = document.getElementById('sel-count');
  if (el) el.textContent = n > 0 ? `${n}か国 選択中` : '';
  const btn = document.getElementById('btn-run');
  if (btn) btn.disabled = n === 0;
}

// ── Image Upload ──
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
dropZone.onclick = () => fileInput.click();
dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('drag-over'); };
dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
dropZone.ondrop = e => { e.preventDefault(); dropZone.classList.remove('drag-over'); if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]); };
fileInput.onchange = () => { if (fileInput.files[0]) loadImage(fileInput.files[0]); };
document.getElementById('preview-remove').onclick = () => {
  imageBase64 = null;
  document.getElementById('preview-wrap').style.display = 'none';
  dropZone.style.display = 'block';
  fileInput.value = '';
};

function loadImage(file) {
  imageMediaType = 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1280;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) { if (w > h) { h = Math.round(h*MAX/w); w = MAX; } else { w = Math.round(w*MAX/h); h = MAX; } }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.8);
      imageBase64 = compressed.split(',')[1];
      document.getElementById('preview-img').src = compressed;
      document.getElementById('preview-wrap').style.display = 'block';
      dropZone.style.display = 'none';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Fetch Regulations ──
async function fetchRegulations(codes) {
  // Step1: JETROスクレイピング
  const jetroPayload = { action: 'fetchJetro', countryCodes: codes };
  const jetroUrl = GAS_URL + '?payload=' + encodeURIComponent(JSON.stringify(jetroPayload));
  const jetroRes = await fetch(jetroUrl, { method:'GET', redirect:'follow' });
  const jetroData = await jetroRes.json();
  if (jetroData.status !== 'ok') throw new Error(jetroData.message || 'JETRO取得エラー');

  // Step2: Geminiで要約
  const countryNames = codes.map(c => COUNTRIES.find(x => x.code === c).name).join('、');
  let jetroContext = '';
  Object.entries(jetroData.results).forEach(([code, info]) => {
    const c = COUNTRIES.find(x => x.code === code);
    if (info.text) jetroContext += `\n\n=== ${c?.name}（${code}）===\n${info.text}`;
  });

  const prompt = `以下はJETROの食品輸入規制ページから取得したテキストです。
対象国：${countryNames}（国コード: ${codes.join(', ')}）

【重要】上記の対象国のみについて整理してください。それ以外の国は絶対に含めないでください。
各国について：禁止・制限添加物、放射性物質規制、宗教的要件、規制機関を整理してください。

${jetroContext}

JSONのみで返してください（コードブロック不要）：
{"countries":{"国コード":{"name":"国名","summary":"概要200字以内","key_restrictions":["制限事項"],"radiation_rules":"放射規制またはnull","sources":[{"title":"JETROページ","url":"URL"}]}}}
国コードは必ず ${codes.join(', ')} のみを使用してください。`;

  const summaryRes = await callGAS(prompt, false);
  const parsed = parseJSON(summaryRes);

  // 選択国以外をフィルタ
  if (parsed?.countries) {
    Object.keys(parsed.countries).forEach(code => { if (!codes.includes(code)) delete parsed.countries[code]; });
  }

  // 保存
  const now = Date.now();
  codes.forEach(code => {
    if (parsed?.countries?.[code]) {
      regulationInfo[code] = { data: parsed.countries[code], fetchedAt: now };
    }
  });
  saveRegulationToStorage();
  return parsed;
}

// ── Update (selected countries) ──
async function fetchSelected() {
  if (selectedForUpdate.size === 0) { showToast('⚠ 更新する国を選択してください'); return; }
  isUpdating = true;
  setLoading('run', true, '更新中...');
  const box = document.getElementById('reg-status-box');
  box.style.display = 'none';
  try {
    const codes = [...selectedForUpdate];
    await fetchRegulations(codes);
    selectedForUpdate.clear();
    buildCountryRegList();
    box.className = 'reg-status-box ok';
    box.textContent = `✓ ${codes.map(c=>COUNTRIES.find(x=>x.code===c).name).join('・')} の規制情報を更新しました`;
    box.style.display = 'block';
    showToast('✓ 更新完了');
  } catch(e) {
    box.className = 'reg-status-box error';
    box.textContent = `取得エラー: ${e.message}`;
    box.style.display = 'block';
  }
  isUpdating = false;
  setLoading('run', false, '↻ 更新実行');
}

// ── Run Check ──
async function runCheck() {
  if (!imageBase64) { showToast('⚠ 画像をアップロードしてください'); return; }
  if (selectedCountries.size === 0) { showToast('⚠ 対象国を選択してください'); return; }
  document.getElementById('results').style.display = 'none';
  setLoading('check', true, '確認中... (原材料を読み取り中)');
  try {
    // Step1: 画像解析（Gemini直接）
    const extractRes = await callGeminiDirect(
      `この画像の原材料表示を読み取りすべての原材料・添加物をリストアップしてください。日本語の原材料名そのまま。JSONのみ（コードブロック不要）：{"ingredients":["原材料1","原材料2"],"raw_text":"原材料表示テキスト全体"}`,
      imageBase64
    );
    const extractData = parseJSON(extractRes);
    const ingredients = extractData.ingredients || [];
    if (ingredients.length === 0) throw new Error('画像から原材料を読み取れませんでした。原材料表示部分が写っているか確認してください。');

    // Step2: 規制照合
    setLoading('check', true, '確認中... (規制と照合中)');
    const codes = [...selectedCountries];
    const countryNames = codes.map(c => COUNTRIES.find(x => x.code === c).name).join('、');
    let regCtx = '';
    if (Object.keys(regulationInfo).length > 0) {
      regCtx = '\n参考規制情報:\n' + codes.map(code => {
        const info = regulationInfo[code];
        return info ? `${code}:${info.data?.summary||''}` : '';
      }).filter(Boolean).join('\n');
    }
    // JETROのURLを規制情報から取得
    const jetroUrls = {};
    codes.forEach(code => {
      const info = regulationInfo[code];
      if (info?.data?.sources?.length) {
        const jetro = info.data.sources.find(s => s.url && s.url.includes('jetro.go.jp'));
        if (jetro) jetroUrls[code] = jetro;
      }
    });

    const checkPrompt = `原材料：${ingredients.join('、')}
対象国：${codes.join(',')}（${countryNames}）${regCtx}

各国への日本からの食品輸出規制で問題のある原材料を特定してください。
URLは絶対に捏造しないでください。sourcesのurlは空文字にしてください。
JSONのみ（コードブロック不要）：
{"ingredients":["原材料"],"countries":{"国コード":{"status":"ok|caution|banned","issues":[{"ingredient":"原材料","type":"banned|restricted|caution","reason":"理由60字","detail":"詳細150字","sources":[{"title":"出典名のみ","url":""}]}],"note":"注意またはnull"}}}`;

    const checkRes = await callGAS(checkPrompt, false);
    const checkData = parseJSON(checkRes);
    checkData.ingredients = checkData.ingredients || ingredients;
    renderResults(checkData, ingredients);
    setLoading('check', false, '✓ 確認完了');
    showToast('✓ チェック完了');
  } catch(e) {
    document.getElementById('results').style.display = 'block';
    document.getElementById('results').innerHTML = `<div class="error-box">エラー: ${e.message}</div>`;
    setLoading('check', false, '✓ 確認');
  }
}

// ── Render Results ──
function renderResults(data, rawIngredients) {
  const container = document.getElementById('results');
  container.style.display = 'block';
  const allIssues = Object.values(data.countries||{}).flatMap(c => c.issues||[]);
  const hasBanned = allIssues.some(i => i.type==='banned');
  const hasCaution = allIssues.some(i => i.type!=='banned');

  const summaryHTML = hasBanned
    ? `<div class="result-summary danger"><span class="ricon">🚫</span>輸入禁止に該当する可能性のある成分が含まれています</div>`
    : hasCaution
    ? `<div class="result-summary warn"><span class="ricon">⚠️</span>追加確認が必要な成分が含まれています</div>`
    : `<div class="result-summary ok"><span class="ricon">✅</span>選択した全国において明らかな規制該当項目は見つかりませんでした</div>`;

  const flaggedSet = new Set(allIssues.filter(i=>i.type==='banned').map(i=>i.ingredient));
  const cautionSet = new Set(allIssues.filter(i=>i.type!=='banned').map(i=>i.ingredient));
  const ingredients = data.ingredients?.length ? data.ingredients : rawIngredients;

  const tagsHTML = `<div class="ingredients-box">
    <h3>検出された原材料</h3>
    <div class="ingredient-tags">
      ${ingredients.map(ing => {
        const f = [...flaggedSet].some(x => ing.includes(x)||x.includes(ing));
        const c = [...cautionSet].some(x => ing.includes(x)||x.includes(ing));
        return `<span class="ingredient-tag ${f?'flagged':c?'caution':''}">${ing}</span>`;
      }).join('')}
    </div>
  </div>`;

  let countriesHTML = '';
  const codes = [...selectedCountries];
  codes.forEach(code => {
    const country = COUNTRIES.find(c=>c.code===code);
    const result = (data.countries||{})[code];
    if (!result) return;
    const banned = (result.issues||[]).filter(i=>i.type==='banned');
    const cautions = (result.issues||[]).filter(i=>i.type!=='banned');
    const badge = banned.length>0 ? `<span class="status-badge badge-danger">禁止成分あり</span>`
      : cautions.length>0 ? `<span class="status-badge badge-warn">要確認</span>`
      : `<span class="status-badge badge-ok">問題なし</span>`;
    let bodyHTML = '';
    // JETROリンクをlocalStorageから取得
    const regInfo = regulationInfo[code];
    const jetroSource = regInfo?.data?.sources?.find(s => s.url && s.url.includes('jetro.go.jp'));
    const jetroLinkHTML = jetroSource
      ? `<a class="source-link" href="${jetroSource.url}" target="_blank" rel="noopener" style="margin-top:6px;display:inline-block;">🔗 JETROページで詳細を確認</a>`
      : '';

    banned.forEach(i => { bodyHTML += `<div class="issue-item"><div class="issue-name">🚫 ${i.ingredient}</div><div class="issue-reason">${i.reason}</div><p style="font-size:12px;">${i.detail||''}</p>${jetroLinkHTML}</div>`; });
    cautions.forEach(i => { bodyHTML += `<div class="caution-item"><div class="caution-name">⚠️ ${i.ingredient}</div><div class="issue-reason">${i.reason}</div><p style="font-size:12px;">${i.detail||''}</p>${jetroLinkHTML}</div>`; });
    if (result.note) bodyHTML += `<p style="font-size:12px;margin-top:4px;">📋 ${result.note}</p>`;
    if (!bodyHTML) bodyHTML = `<p style="color:var(--ok);">この国への輸出に関する明らかな規制該当項目は見つかりませんでした。</p>${jetroLinkHTML}`;
    countriesHTML += `<div class="country-result" id="res-${code}">
      <div class="country-result-header" onclick="toggleAcc('res-${code}')">
        <span class="cflag">${country.flag}</span><span class="cname">${country.name}</span>${badge}<span class="chevron">▼</span>
      </div>
      <div class="country-result-body">${bodyHTML}</div>
    </div>`;
  });

  container.innerHTML = summaryHTML + tagsHTML + countriesHTML +
    `<p class="result-note">※ AIによる参考情報です。実際の輸出前には各国規制当局または専門家にご確認ください。</p>`;

  codes.forEach(code => {
    const r = (data.countries||{})[code];
    if (r?.issues?.length>0) document.getElementById(`res-${code}`)?.classList.add('open');
  });
}

function renderSources(sources) {
  if (!sources?.length) return '';
  const id = 'src-'+Math.random().toString(36).slice(2);
  const links = sources.map(s => {
    // JETROのURLは信頼できるのでリンク表示、それ以外はテキストのみ
    const isJetro = s.url && s.url.includes('jetro.go.jp');
    if (isJetro) {
      return `<a class="source-link" href="${s.url}" target="_blank" rel="noopener">🔗 ${s.title||s.url}</a>`;
    }
    // Geminiが生成したURLは不正確な場合があるためテキスト表示のみ
    return `<span style="font-size:11px;color:var(--text-ter);display:block;margin-bottom:4px;">📄 ${s.title||s.url}</span>`;
  }).join('');
  const note = `<span style="font-size:10px;color:var(--text-ter);display:block;margin-top:6px;">※ JETRO以外のURLはAI生成のため参考情報です</span>`;
  return `<button class="sources-toggle" onclick="toggleSrc('${id}')">▶ ソースを見る</button><div class="sources-list" id="${id}">${links}${note}</div>`;
}
function toggleSrc(id){ const el=document.getElementById(id); el.classList.toggle('open'); el.previousElementSibling.textContent=el.classList.contains('open')?'▼ ソースを閉じる':'▶ ソースを見る'; }
function toggleAcc(id){ document.getElementById(id).classList.toggle('open'); }

// ── API calls ──
// レート制限時にretrySecond秒待って再試行（最大maxRetries回）
async function withRetry(fn, maxRetries=2) {
  for (let i=0; i<=maxRetries; i++) {
    try { return await fn(); }
    catch(e) {
      const msg = e.message || '';
      const retryMatch = msg.match(/retry in ([\d.]+)s/i);
      if (retryMatch && i < maxRetries) {
        // APIが指定した待機時間＋10秒の余裕を持たせる
        const waitSec = Math.ceil(parseFloat(retryMatch[1])) + 10;
        setLoading('check', true, `レート制限中... ${waitSec}秒後に自動再試行します`);
        await new Promise(r => setTimeout(r, waitSec * 1000));
      } else {
        // リトライ上限に達したら分かりやすいメッセージに変換
        if (retryMatch) {
          throw new Error(`APIのレート制限に達しました。1分ほど待ってから再度お試しください。`);
        }
        throw e;
      }
    }
  }
}

async function callGAS(prompt, useSearch=false) {
  const payload = { action:'callGemini', prompt, imageBase64:null, imageMediaType:null, useSearch };
  const url = GAS_URL + '?payload=' + encodeURIComponent(JSON.stringify(payload));
  const res = await fetch(url, { method:'GET', redirect:'follow' });
  const rawText = await res.text();
  let data;
  try { data = JSON.parse(rawText); }
  catch(e) {
    if (rawText.trim().startsWith('<')) throw new Error('GAS_URLを確認してください');
    throw new Error('レスポンスのパースに失敗: '+rawText.slice(0,80));
  }
  if (data.status !== 'ok') throw new Error(data.message||'GASエラー');
  return data.text;
}

async function callGeminiDirect(prompt, b64) {
  if (!geminiApiKey) {
    const res = await fetch(GAS_URL+'?action=getKey');
    const data = await res.json();
    if (data.status==='ok') geminiApiKey = data.key;
    else throw new Error('Gemini APIキーを取得できませんでした');
  }
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${geminiApiKey}`;
  return await withRetry(async () => {
    const res = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{role:'user',parts:[
          {inline_data:{mime_type:'image/jpeg',data:b64}},
          {text:prompt}
        ]}],
        generationConfig:{temperature:0.2,maxOutputTokens:2048}
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message||`Gemini APIエラー (${res.status})`);
    const text = (data.candidates?.[0]?.content?.parts||[]).filter(p=>p.text).map(p=>p.text).join('');
    if (!text) throw new Error('Geminiから応答を取得できませんでした');
    return text;
  });
}

function parseJSON(text) {
  const clean = text.replace(/```json/g,'').replace(/```/g,'').trim();
  try { return JSON.parse(clean); } catch {}
  const s=clean.indexOf('{'), e=clean.lastIndexOf('}');
  if (s!==-1&&e>s) { try { return JSON.parse(clean.slice(s,e+1)); } catch {} }
  throw new Error('JSONの解析に失敗しました。モデルの応答: '+clean.slice(0,80));
}

function setLoading(type, loading, label) {
  const btn = document.getElementById(`btn-${type}`);
  const spinner = document.getElementById(`${type}-spinner`);
  const lbl = document.getElementById(`${type}-label`);
  if (btn) btn.disabled = loading;
  if (spinner) spinner.style.display = loading ? 'block' : 'none';
  if (lbl) lbl.textContent = label;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
